<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Wajah Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .video-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.5);
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            z-index: 10;
            display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-card:hover {
            transform: translateX(5px);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-green-500 p-2 rounded-lg">
                    <i class="fas fa-user-check text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Face Attendance <span class="text-green-600">Pro</span></h1>
            </div>
            <div class="hidden md:flex items-center space-x-6">
                <span id="current-time" class="text-slate-500 font-medium">--:--:--</span>
                <div class="h-4 w-px bg-slate-200"></div>
                <div class="flex items-center space-x-2">
                    <div id="connection-dot" class="h-2 w-2 rounded-full bg-slate-300"></div>
                    <span id="connection-text" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">OFFLINE</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-6 lg:p-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Side: Video Feed -->
            <div class="lg:col-span-7 xl:col-span-8">
                <div class="bg-white rounded-2xl video-container overflow-hidden border border-slate-100">
                    <div class="relative aspect-video bg-slate-900 group">
                        <video id="video" autoplay playsinline class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></video>
                        <canvas id="canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
                        
                        <!-- Scanning Animation -->
                        <div id="scan-line" class="scanning-line"></div>
                        
                        <!-- Overlay when starting -->
                        <div id="camera-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 text-white z-20">
                            <div class="animate-spin rounded-full h-12 w-12 border-4 border-green-500 border-t-transparent mb-4"></div>
                            <p class="text-slate-400 font-medium">Menghubungkan Kamera...</p>
                        </div>

                        <!-- Recognition Feedback UI -->
                        <div id="match-feedback" class="absolute bottom-6 left-6 right-6 z-30 opacity-0 transition-opacity duration-300">
                            <div class="bg-white/90 backdrop-blur-md p-4 rounded-xl shadow-2xl flex items-center space-x-4 border border-white">
                                <div class="bg-green-100 p-3 rounded-full">
                                    <i class="fas fa-check-circle text-green-600 text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-green-600 uppercase tracking-widest">Wajah Dikenali</p>
                                    <h2 id="detected-name" class="text-xl font-bold text-slate-800">Nama Pengguna</h2>
                                </div>
                                <div class="ml-auto bg-slate-100 px-3 py-1 rounded-full">
                                    <span id="detected-conf" class="text-xs font-bold text-slate-600">98% Match</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-5 flex items-center justify-between bg-white">
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center space-x-2">
                                <span class="relative flex h-3 w-3">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                                </span>
                                <span id="status-text" class="text-sm font-semibold text-slate-600">Sistem Aktif - Memindai...</span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button id="toggle-camera" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-semibold transition-colors">
                                <i class="fas fa-camera mr-2"></i> Reset Kamera
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Recent Logs -->
            <div class="lg:col-span-5 xl:col-span-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col">
                    <div class="p-6 border-b border-slate-100 flex items-center justify-between">
                        <h3 class="font-bold text-slate-800 text-lg">Absensi Terakhir</h3>
                        <span class="bg-slate-100 text-slate-500 text-[10px] font-bold px-2 py-1 rounded uppercase">Real-time</span>
                    </div>
                    
                    <div id="log-list" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
                        <!-- Placeholder for loading logs -->
                        <div class="animate-pulse space-y-3">
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                        </div>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-b-2xl border-t border-slate-100">
                        <a href="/dashboard" target="_blank" class="w-full flex items-center justify-center space-x-2 py-3 bg-white hover:bg-slate-100 border border-slate-200 text-slate-700 rounded-xl text-sm font-bold transition-all shadow-sm">
                            <i class="fas fa-chart-pie"></i>
                            <span>Lihat Semua Laporan</span>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-slate-400 text-xs">
            <p>&copy; 2026 AI Attendance Pro System. Developed for Modern Workforce.</p>
            <div class="flex space-x-4 mt-4 md:mt-0">
                <span class="flex items-center"><i class="fas fa-shield-halved mr-1"></i> Data Terenkripsi</span>
                <span class="flex items-center"><i class="fas fa-bolt mr-1"></i> AI SFace Engine</span>
            </div>
        </div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const logList = document.getElementById('log-list');
        const cameraOverlay = document.getElementById('camera-overlay');
        const scanLine = document.getElementById('scan-line');
        const feedbackUI = document.getElementById('match-feedback');
        const detectedName = document.getElementById('detected-name');
        const detectedConf = document.getElementById('detected-conf');
        const connectionDot = document.getElementById('connection-dot');
        const connectionText = document.getElementById('connection-text');
        const currentTimeText = document.getElementById('current-time');

        let lastDetectedTime = 0;
        const FEEDBACK_DURATION = 3000; // 3 seconds

        // Update Clock
        function updateClock() {
            const now = new Date();
            currentTimeText.innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Access camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.classList.remove('opacity-0');
                    cameraOverlay.classList.add('hidden');
                    scanLine.style.display = 'block';
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Update connection UI
                    connectionDot.classList.remove('bg-slate-300');
                    connectionDot.classList.add('bg-green-500');
                    connectionText.innerText = "ONLINE";
                    connectionText.classList.remove('text-slate-400');
                    connectionText.classList.add('text-green-600');
                    
                    // Start processing loop
                    setInterval(processFrame, 1500);
                };
            } catch (err) {
                console.error("Camera error:", err);
                statusText.innerText = "Status: Kamera Gagal Diakses!";
                cameraOverlay.innerHTML = `<i class="fas fa-exclamation-triangle text-3xl text-red-500 mb-2"></i><p class="text-red-400">Gagal mengakses kamera</p>`;
            }
        }

        async function processFrame() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const base64Img = tempCanvas.toDataURL('image/jpeg', 0.8);
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Img })
                });
                
                const data = await response.json();
                
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (data.results && data.results.length > 0) {
                    data.results.forEach(res => {
                        const [x, y, w, h] = res.box;
                        
                        // Draw stylized box
                        ctx.strokeStyle = '#22c55e';
                        ctx.lineWidth = 4;
                        ctx.lineJoin = 'round';
                        ctx.strokeRect(x, y, w, h);
                        
                        // Show Match Feedback
                        showMatchFeedback(res.name, res.confidence);
                    });
                }
                
                if (data.recent_logs) {
                    updateLogs(data.recent_logs);
                }
                
            } catch (err) {
                console.error("Processing error:", err);
            }
        }

        function showMatchFeedback(name, conf) {
            detectedName.innerText = name;
            detectedConf.innerText = `${conf}% Match`;
            feedbackUI.style.opacity = '1';
            
            lastDetectedTime = Date.now();
            setTimeout(() => {
                if (Date.now() - lastDetectedTime >= FEEDBACK_DURATION) {
                    feedbackUI.style.opacity = '0';
                }
            }, FEEDBACK_DURATION);
        }

        function updateLogs(logs) {
            if (logs.length === 0) {
                logList.innerHTML = `<div class="text-center py-10 text-slate-400"><i class="fas fa-history text-2xl mb-2"></i><p>Belum ada data</p></div>`;
                return;
            }

            logList.innerHTML = '';
            logs.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = `log-card bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between fade-in`;
                div.style.animationDelay = `${index * 0.1}s`;
                
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="bg-slate-100 h-10 w-10 rounded-full flex items-center justify-center text-slate-500 font-bold">
                            ${log.name.charAt(0)}
                        </div>
                        <div>
                            <p class="font-bold text-slate-700 text-sm leading-tight">${log.name}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Berhasil Absen</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-slate-800">${log.time}</p>
                        <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Hadir</p>
                    </div>
                `;
                logList.appendChild(div);
            });
        }

        document.getElementById('toggle-camera').addEventListener('click', () => {
            location.reload();
        });

        startCamera();
    </script>
</body>
</html>
