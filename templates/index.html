<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Absensi Wajah Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .video-container {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.5);
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            z-index: 10;
            display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-card:hover {
            transform: translateX(5px);
            transition: all 0.2s ease;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Active type button */
        .type-btn-active {
            background-color: #22c55e !important;
            color: white !important;
            border-color: #22c55e !important;
            box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.2);
        }

        /* Active shift button */
        .shift-btn-active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-green-500 p-1.5 rounded-lg">
                    <i class="fas fa-user-check text-white text-lg"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-800 tracking-tight">Face Attendance <span class="text-green-600">Pro</span></h1>
            </div>
            <div class="flex items-center space-x-3 md:space-x-6">
                <span id="current-time" class="text-slate-600 font-bold text-sm md:text-base">--:--:--</span>
                <div class="hidden md:block h-4 w-px bg-slate-200"></div>
                <div class="flex items-center space-x-2">
                    <div id="connection-dot" class="h-2 w-2 rounded-full bg-slate-300"></div>
                    <span id="connection-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">OFFLINE</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Selection Controls (Mobile) -->
    <div class="bg-white border-b border-slate-100 p-3 md:hidden space-y-3">
        <!-- Shift Selection Mobile -->
        <div class="flex space-x-2">
            <button id="mobile-shift-1" onclick="setShift('Shift 1')" class="flex-1 py-2 px-4 rounded-xl border border-slate-200 font-bold text-[10px] flex items-center justify-center space-x-2 transition-all shift-btn-active">
                <i class="fas fa-clock"></i>
                <span>SHIFT 1</span>
            </button>
            <button id="mobile-shift-2" onclick="setShift('Shift 2')" class="flex-1 py-2 px-4 rounded-xl border border-slate-200 font-bold text-[10px] flex items-center justify-center space-x-2 transition-all">
                <i class="fas fa-moon"></i>
                <span>SHIFT 2</span>
            </button>
        </div>
        <!-- Type Selection Mobile -->
        <div class="flex space-x-2">
            <button id="mobile-btn-masuk" onclick="setAttendanceType('masuk')" class="flex-1 py-3 px-4 rounded-xl border border-slate-200 font-bold text-sm flex items-center justify-center space-x-2 transition-all type-btn-active">
                <i class="fas fa-sign-in-alt"></i>
                <span>MASUK</span>
            </button>
            <button id="mobile-btn-pulang" onclick="setAttendanceType('pulang')" class="flex-1 py-3 px-4 rounded-xl border border-slate-200 font-bold text-sm flex items-center justify-center space-x-2 transition-all">
                <i class="fas fa-sign-out-alt"></i>
                <span>PULANG</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            
            <!-- Left Side: Video Feed -->
            <div class="lg:col-span-7 xl:col-span-8 space-y-4">
                
                <!-- Desktop Controls -->
                <div class="hidden md:flex flex-wrap gap-4 items-center">
                    <!-- Shift Selection Desktop -->
                    <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 flex">
                        <button id="desktop-shift-1" onclick="setShift('Shift 1')" class="py-2 px-6 rounded-xl font-bold text-xs flex items-center space-x-2 transition-all shift-btn-active">
                            <i class="fas fa-clock"></i>
                            <span>Shift 1</span>
                        </button>
                        <button id="desktop-shift-2" onclick="setShift('Shift 2')" class="py-2 px-6 rounded-xl font-bold text-xs flex items-center space-x-2 transition-all text-slate-500 hover:bg-slate-50">
                            <i class="fas fa-moon"></i>
                            <span>Shift 2</span>
                        </button>
                    </div>

                    <!-- Type Selection Desktop -->
                    <div class="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 flex">
                        <button id="desktop-btn-masuk" onclick="setAttendanceType('masuk')" class="py-2 px-6 rounded-xl font-bold text-xs flex items-center space-x-2 transition-all type-btn-active">
                            <i class="fas fa-sign-in-alt"></i>
                            <span>Absen Masuk</span>
                        </button>
                        <button id="desktop-btn-pulang" onclick="setAttendanceType('pulang')" class="py-2 px-6 rounded-xl font-bold text-xs flex items-center space-x-2 transition-all text-slate-500 hover:bg-slate-50">
                            <i class="fas fa-sign-out-alt"></i>
                            <span>Absen Pulang</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl video-container overflow-hidden border border-slate-100 relative">
                    <div class="relative aspect-[4/3] md:aspect-video bg-slate-900 group">
                        <video id="video" autoplay playsinline class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></video>
                        <canvas id="canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
                        
                        <!-- Scanning Animation -->
                        <div id="scan-line" class="scanning-line"></div>
                        
                        <!-- Overlay when starting -->
                        <div id="camera-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 text-white z-20">
                            <div class="animate-spin rounded-full h-10 w-10 border-4 border-green-500 border-t-transparent mb-4"></div>
                            <p class="text-slate-400 text-sm font-medium">Menghubungkan Kamera...</p>
                        </div>

                        <!-- Recognition Feedback UI -->
                        <div id="match-feedback" class="absolute bottom-4 left-4 right-4 md:bottom-6 md:left-6 md:right-6 z-30 opacity-0 transition-all duration-300 transform translate-y-4">
                            <div class="bg-white/95 backdrop-blur-md p-3 md:p-4 rounded-xl shadow-2xl flex items-center space-x-3 md:space-x-4 border border-white">
                                <div class="bg-green-100 p-2 md:p-3 rounded-full">
                                    <i class="fas fa-check-circle text-green-600 text-lg md:text-xl"></i>
                                </div>
                                <div class="flex-grow">
                                    <p id="feedback-info" class="text-[10px] font-bold text-green-600 uppercase tracking-widest">ABSEN MASUK • SHIFT 1 BERHASIL</p>
                                    <h2 id="detected-name" class="text-lg md:text-xl font-bold text-slate-800 truncate max-w-[150px] md:max-w-none">Nama Pengguna</h2>
                                </div>
                                <div class="bg-slate-100 px-2 py-1 rounded-full shrink-0">
                                    <span id="detected-conf" class="text-[10px] font-bold text-slate-600">98% Match</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 flex items-center justify-between bg-white border-t border-slate-50">
                        <div class="flex items-center space-x-3">
                            <div class="flex items-center space-x-2">
                                <span class="relative flex h-2 w-2">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                                </span>
                                <span id="status-text" class="text-xs font-semibold text-slate-500">Memindai Wajah...</span>
                            </div>
                        </div>
                        <button id="toggle-camera" class="p-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Recent Logs -->
            <div class="lg:col-span-5 xl:col-span-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col min-h-[400px]">
                    <div class="p-5 border-b border-slate-100 flex items-center justify-between">
                        <div>
                            <h3 class="font-bold text-slate-800 text-base">Absensi Hari Ini</h3>
                            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Log Terkini</p>
                        </div>
                        <span class="bg-green-50 text-green-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Real-time</span>
                    </div>
                    
                    <div id="log-list" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
                        <!-- Placeholder for loading logs -->
                        <div class="animate-pulse space-y-3">
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                            <div class="h-16 bg-slate-50 rounded-xl"></div>
                        </div>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-b-2xl border-t border-slate-100">
                        <a href="/dashboard" target="_blank" class="w-full flex items-center justify-center space-x-2 py-3 bg-white hover:bg-slate-100 border border-slate-200 text-slate-700 rounded-xl text-sm font-bold transition-all shadow-sm">
                            <i class="fas fa-file-alt text-slate-400"></i>
                            <span>Rekapitulasi Absensi</span>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6 px-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-slate-400 text-[10px] md:text-xs">
            <p class="text-center md:text-left">&copy; 2026 Face Recognition Attendance System. V2.1 Shift Support.</p>
            <div class="flex space-x-4 mt-4 md:mt-0">
                <span class="flex items-center"><i class="fas fa-shield-halved mr-1"></i> Secure</span>
                <span class="flex items-center"><i class="fas fa-bolt mr-1"></i> Fast AI</span>
            </div>
        </div>
    </footer>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const logList = document.getElementById('log-list');
        const cameraOverlay = document.getElementById('camera-overlay');
        const scanLine = document.getElementById('scan-line');
        const feedbackUI = document.getElementById('match-feedback');
        const feedbackInfo = document.getElementById('feedback-info');
        const detectedName = document.getElementById('detected-name');
        const detectedConf = document.getElementById('detected-conf');
        const connectionDot = document.getElementById('connection-dot');
        const connectionText = document.getElementById('connection-text');
        const currentTimeText = document.getElementById('current-time');

        let currentAttendanceType = 'masuk';
        let currentShift = 'Shift 1';
        let lastDetectedTime = 0;
        const FEEDBACK_DURATION = 3000;

        // Update Clock
        function updateClock() {
            const now = new Date();
            currentTimeText.innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function setShift(shift) {
            currentShift = shift;
            
            // Update buttons UI
            const shifts = ['Shift 1', 'Shift 2'];
            shifts.forEach(s => {
                const mobileBtn = document.getElementById(`mobile-shift-${s.split(' ')[1]}`);
                const desktopBtn = document.getElementById(`desktop-shift-${s.split(' ')[1]}`);
                
                if (s === shift) {
                    mobileBtn.classList.add('shift-btn-active');
                    desktopBtn.classList.add('shift-btn-active');
                    desktopBtn.classList.remove('text-slate-500', 'hover:bg-slate-50');
                } else {
                    mobileBtn.classList.remove('shift-btn-active');
                    desktopBtn.classList.remove('shift-btn-active');
                    desktopBtn.classList.add('text-slate-500', 'hover:bg-slate-50');
                }
            });
        }

        function setAttendanceType(type) {
            currentAttendanceType = type;
            
            // Update buttons UI
            const types = ['masuk', 'pulang'];
            types.forEach(t => {
                const mobileBtn = document.getElementById(`mobile-btn-${t}`);
                const desktopBtn = document.getElementById(`desktop-btn-${t}`);
                
                if (t === type) {
                    mobileBtn.classList.add('type-btn-active');
                    desktopBtn.classList.add('type-btn-active');
                    desktopBtn.classList.remove('text-slate-500', 'hover:bg-slate-50');
                } else {
                    mobileBtn.classList.remove('type-btn-active');
                    desktopBtn.classList.remove('type-btn-active');
                    desktopBtn.classList.add('text-slate-500', 'hover:bg-slate-50');
                }
            });
        }

        // Access camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user"
                    } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.classList.remove('opacity-0');
                    cameraOverlay.classList.add('hidden');
                    scanLine.style.display = 'block';
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    connectionDot.classList.remove('bg-slate-300');
                    connectionDot.classList.add('bg-green-500');
                    connectionText.innerText = "ONLINE";
                    connectionText.classList.remove('text-slate-400');
                    connectionText.classList.add('text-green-600');
                    
                    setInterval(processFrame, 1500);
                };
            } catch (err) {
                console.error("Camera error:", err);
                statusText.innerText = "Kamera Gagal!";
                cameraOverlay.innerHTML = `<i class="fas fa-exclamation-triangle text-2xl text-red-500 mb-2"></i><p class="text-red-400 text-xs">Gagal mengakses kamera</p>`;
            }
        }

        async function processFrame() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const base64Img = tempCanvas.toDataURL('image/jpeg', 0.7);
            
            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: base64Img,
                        type: currentAttendanceType,
                        shift: currentShift
                    })
                });
                
                const data = await response.json();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (data.results && data.results.length > 0) {
                    data.results.forEach(res => {
                        const [x, y, w, h] = res.box;
                        ctx.strokeStyle = '#22c55e';
                        ctx.lineWidth = 4;
                        ctx.lineJoin = 'round';
                        ctx.strokeRect(x, y, w, h);
                        showMatchFeedback(res.name, res.confidence);
                    });
                }
                
                if (data.recent_logs) {
                    updateLogs(data.recent_logs);
                }
            } catch (err) {
                console.error("Processing error:", err);
            }
        }

        function showMatchFeedback(name, conf) {
            detectedName.innerText = name;
            detectedConf.innerText = `${conf}% Match`;
            feedbackInfo.innerText = `ABSEN ${currentAttendanceType.toUpperCase()} • ${currentShift.toUpperCase()} BERHASIL`;
            
            feedbackUI.style.opacity = '1';
            feedbackUI.style.transform = 'translateY(0)';
            
            lastDetectedTime = Date.now();
            setTimeout(() => {
                if (Date.now() - lastDetectedTime >= FEEDBACK_DURATION) {
                    feedbackUI.style.opacity = '0';
                    feedbackUI.style.transform = 'translateY(1rem)';
                }
            }, FEEDBACK_DURATION);
        }

        function updateLogs(logs) {
            if (logs.length === 0) {
                logList.innerHTML = `<div class="text-center py-10 text-slate-300"><i class="fas fa-history text-2xl mb-2"></i><p class="text-xs">Belum ada data</p></div>`;
                return;
            }

            logList.innerHTML = '';
            logs.forEach((log, index) => {
                const isMasuk = log.type === 'masuk';
                const typeLabel = isMasuk ? 'Masuk' : 'Pulang';
                const typeColor = isMasuk ? 'text-blue-500' : 'text-orange-500';
                const typeBg = isMasuk ? 'bg-blue-50' : 'bg-orange-50';
                const typeIcon = isMasuk ? 'fa-sign-in-alt' : 'fa-sign-out-alt';
                
                const div = document.createElement('div');
                div.className = `log-card bg-white p-3 md:p-4 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between fade-in`;
                div.style.animationDelay = `${index * 0.1}s`;
                
                div.innerHTML = `
                    <div class="flex items-center space-x-3 overflow-hidden">
                        <div class="${typeBg} h-9 w-9 md:h-10 md:w-10 rounded-full flex items-center justify-center ${typeColor} font-bold shrink-0">
                            <i class="fas ${typeIcon} text-xs md:text-sm"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="font-bold text-slate-700 text-xs md:text-sm truncate">${log.name}</p>
                            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">${typeLabel} • ${log.shift} • ${log.time}</p>
                        </div>
                    </div>
                    <div class="text-right shrink-0 ml-2 flex flex-col items-end space-y-1">
                        <span class="${typeBg} ${typeColor} text-[8px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest">${typeLabel}</span>
                        <span class="bg-slate-100 text-slate-500 text-[8px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest">${log.shift}</span>
                    </div>
                `;
                logList.appendChild(div);
            });
        }

        document.getElementById('toggle-camera').addEventListener('click', () => {
            location.reload();
        });

        startCamera();
    </script>
</body>
</html>
